<!DOCTYPE html>
<html lang="ja">
<head>

<style>

.percentInBar{

left:0;

font-size:12px;
font-weight:bold;

pointer-events:none;
display:flex;
align-items:center;
justify-content:space-between;

}

.startBtn{

.nameInput{

}

  font-size:28px;
  background:linear-gradient(90deg,#ff6b9a,#6bbcff);

.barBox{

@keyframes fadeUp{

from{opacity:0;transform:translateY(20px);}
}

.barLabel{

font-weight:bold;

font-size:14px;
}

.bar2{

background:#eee;
border-radius:20px;

}

/* 左右の色 */
/* 150行目付近にある .colorFill をこれに書き換え */

.colorFill.left {
  left: 0;
  transform-origin: left; /* 左から右へ伸びる */
}

.colorFill.right {
  right: 0;
  transform-origin: right; /* 右から左へ伸びる（または固定） */
}

/* 真ん中線 */
.centerLine{
background: linear-gradient(#fff,#fff) padding-box,
linear-gradient(135deg,#ff9ad5,#9ad7ff) border-box;
border:3px solid transparent;

position:absolute;
left:50%;
top:0;
width:2px;
height:100%;
background:#fff;
opacity:0.7;
}

/* 168行目付近の .indicator を書き換え */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 22px; /* 少し大きくすると見栄えが良いです */
  height: 22px;
  background: #fff;
  border: 4px solid #ccc; /* 初期値は何でもOK（JSで上書きします） */
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: 1s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 10; /* バーより上に確実に表示 */
}

/* 数字 */
.percentText{
text-align:center;
font-size:13px;

}


#box{
    white-space: pre-line;
}
body{
margin:0;
font-family:"Hiragino Maru Gothic ProN",sans-serif;
background: linear-gradient(135deg,#ffd6ec,#d6f0ff);

justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:40px;
border-radius:25px;
width:90%;
max-width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(171, 171, 171, 0.292);
animation:fade 0.5s;

max-height:90vh;
overflow-y:auto;
transform: scale(1);
animation: popIn 0.6s ease;
}


@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

button{
padding:15px;
margin:10px;
width:90%;
border:none;
border-radius:20px;
background:#f5e8ff;
cursor:pointer;
transition:0.3s;
}

  transform: scale(0.95);
  background: #ffd6ec;
}

.hidden{display:none;}

.bar{

background:#eee;
border-radius:10px;
margin:15px 0;
overflow:hidden;
}

.fill{

background:linear-gradient(90deg,#ffb6d9,#b6e3ff);
transition:1s;
}

.axis{
display:flex;
justify-content:space-between;
font-size:13px;
}

img{
width:200px;
margin:20px 0;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:0.5s;
}
img:hover{
transform:scale(1.05);
}

.section{
text-align:left;
margin-top:15px;
padding:15px;
border-radius:15px;
background:#fff;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.section p{
white-space: pre-line;
line-height:1.7;
}

.axis span{
font-weight:bold;
}

#graph div{
margin-bottom:10px;
font-size:14px;
}

#typeName{
font-size:40px;
font-weight:bold;
background:linear-gradient(90deg,#ff6b9a,#6bbcff);

background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
color:transparent;

display:inline-block;

margin-bottom:10px;
}

#typeName{
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes popIn{
0%{transform:scale(0.9);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

#resultTitle{
font-size:20px;
color:#555;
margin-bottom:5px;
}

.section b{
display:inline-block;
font-size:16px;
margin-bottom:8px;
padding:5px 12px;
border-radius:999px;
background:linear-gradient(90deg,#ff9ad5,#9ad7ff);
color:#fff;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

@keyframes fadeUpBig{
from{
opacity:0;
transform:translateY(30px) scale(0.95);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.section{
animation:fadeUpBig 0.6s ease forwards;
opacity:0;
}
.section:nth-of-type(1){animation-delay:0.2s;}
.section:nth-of-type(2){animation-delay:0.4s;}
.section:nth-of-type(3){animation-delay:0.6s;}
.section:nth-of-type(4){animation-delay:0.8s;}

/* --- 左右の色のバー --- */
.colorFill {
  position: absolute;
  top: 0;
  height: 100%;
  transition: 1s cubic-bezier(.34,1.56,.64,1); /* これがアニメーションの肝 */
}

.colorFill.left {
  left: 0;
}

.colorFill.right {
  right: 0;
}

/* --- 動く丸 --- */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%; /* 初期位置：真ん中 */
  width: 22px;
  height: 22px;
  background: #fff;
  border: 4px solid #ccc;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: 1s cubic-bezier(.34,1.56,.64,1); /* バーと同じ時間で動かす */
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 10;
}

/* ⚠️ 注意：CSSの一番最後に transform: scaleX(0) などの .colorFill 設定が残っていたら、必ず削除してください */

/* --- スタート画面の入力欄とボタンを今風に --- */
.nameInput {
  padding: 15px;
  width: 80%;
  border-radius: 15px;
  border: 2px solid #eee; /* 枠線を少しつける */
  font-size: 18px;
  outline: none;
  transition: 0.3s;
  text-align: center;
}

/* 名前がない時に震える演出 */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
.error-shake {
  animation: shake 0.3s;
  border-color: #ff6b6b;
  background: #fff0f0;
}

/* ボタンをぷっくりさせる */
.startBtn, #result button {
  box-shadow: 0 8px 15px rgba(0,0,0,0.1);
  transform: translateY(0);
}

.startBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* 結果のタイトルを強調 */
#typeName {
  font-size: 50px; /* 大きく */
  letter-spacing: -2px;
  margin: 10px 0;

</style>
</head>

<body>
<div class="container" id="app">

<!-- スタート -->
<div id="start">
<h1 class="title">彼氏ができない原因診断</h1>
<p class="subtitle">あなたの恋愛タイプを診断💖</p>
<input id="name" placeholder="名前を入力" class="nameInput"><br><br>
<button class="startBtn" onclick="startTest()">start</button></div>

<!-- 質問 -->
<div id="quiz" class="hidden">
<h2 id="question"></h2>
<div id="choices"></div>
</div>

<!-- 結果 -->
<div id="result" class="hidden">
<h2 id="resultTitle"></h2>
<h1 id="typeName"></h1>

<img id="resultImage">

<div id="graph"></div>

<div class="section"><b>概要</b><p id="desc"></p></div>
<div class="section"><b>強み</b><p id="good"></p></div>
<div class="section"><b>弱点</b><p id="bad"></p></div>
<div class="section"><b>アドバイス</b><p id="advice"></p></div>

<br>
<button onclick="location.reload()">もう一度やる</button>
</div>

</div>

<script>

let name="",index=0;
let A=0,C=0,R=0;

const MAX_A = 0;
const MAX_C = 0;
const MAX_R = 0;

const questions=[
// ---省略なし完全15問---
{q:"気になる人ができたときどうする？",axis:"A",a:[["A：自分から話しかける・アピールする",5],["B：様子を見るけどタイミングがあれば話す",3],["C：話したいけど何もできない",-3],["D：何も行動せずただ相手が来るのを待つ",-5]]},
{q:"普段の異性とのかかわり方は？",axis:"A",a:[["A：自分から話しかけることが多い",5],["B：話しかけられたら話す",3],["C：あまり関わらない",-3],["D：自分の家族としか話さないレベル",-5]]},
{q:"相手との予定を決めるときは？",axis:"A",a:[["A：自分から日程や内容を提案する",5],["B：お互いに案を出し合って決めたい",3],["C：相手がしたいことをしたい",-3],["D：相手に全部決めてもらいたい",-5]]},
{q:"好きな人と話すチャンスがあったら？",axis:"A",a:[["A：絶対逃さず自分から話す",5],["B：勇気を出して話しかけてみる",3],["C：話せるのに見送ることが多い",-3],["D：絶対無理。話しかけれない",-5]]},
{q:"好きな人の情報を知りたいときは？",axis:"A",a:[["A：直接聞いたり行動で知ろうとする",5],["B：友達の手も借りながら、自分から知ろうとする",3],["C：知りたい情報は友達を通して知る",-3],["D：知りたいなーで終わってしまう事が多い",-5]]},

{q:"自分は恋愛対象としてどう思う？",axis:"C",a:[["A：魅力的だと思う",5],["B：普通かな",3],["C：自信がないなあ",-3],["D：絶対無理",-5]]},
{q:"自分の見た目や性格に、ある程度満足していますか？",axis:"C",a:[["A：満足してる",5],["B：普通かな",3],["C：できてない",-3],["D：死んで来世に期待するレベル",-5]]},
{q:"他の人と比べたときの気持ちは？",axis:"C",a:[["A：自分の方がいいなって思えることがほとんど",5],["B：まあ自分の方がいいって思うことが多いかな",3],["C：自分は劣っていると感じる",-3],["D：毎日比べすぎてしんどくなってくる",-5]]},
{q:"相手が自分に優しくしてくれた時、どう感じる？",axis:"C",a:[["A：「相手も私の事好きなんじゃない！」ポジティブに考える",5],["B：「もしかして脈あり？」期待でどきどき",3],["C：「誰にでも優しいだけ...」と受け流す",-3],["D：「絶対違うんだよな...」とネガティブ思考",-5]]},
{q:"誰かに褒められたときは？",axis:"C",a:[["A：当たり前だろ！！",5],["B：素直に受け取る",3],["C：お世辞かもと思ってしまう",-3],["D：この人は嘘をついていると思ってしまう自分に嫌気がさす",-5]]},

{q:"学校生活の中で、異性のクラスメイトと話す機会がある？",axis:"R",a:[["A：気軽に話せる関係",5],["B：１日１回くらいは話す",3],["C：用事があるときぐらいしか話さない",-3],["D：全く話さないor周りに異性がいない",-5]]},
{q:"新しく異性と知り合う機会がある？（学校・部活・遊びなど）",axis:"R",a:[["A：自分から新しい機会に行く",5],["B：きっかけがあれば ",3],["C：ほとんどない",-3],["D：まじでなんもない",-5]]},
{q:"勉強や部活の忙しさをパーセントで表すと？",axis:"R",a:[["A：９０%",-5],["B：６０%",-3],["C：４０%",3],["D：１０% ",5]]},

// ⭐修正済み2択
{q:"あなたの学校はどっち？",axis:"R",a:[["A：共学",5],["B：女子校",-5]]},
{q:"あなたが普段過ごしているコミュニティーに男子はいる？",axis:"R",a:[["A：いる！",5],["B：いない！",-5]]}
];


let totalA_max = 0;
let totalC_max = 0;
let totalR_max = 0;

questions.forEach(q => {
  let max = Math.max(...q.a.map(c => c[1]));

  if (q.axis === "A") totalA_max += max;
  if (q.axis === "C") totalC_max += max;
  if (q.axis === "R") totalR_max += max;
});

function startTest() {
  const input = document.getElementById("name"); // 入力欄を取得
  name = input.value.trim(); // 名前を取得して前後の空白を消す

  // もし名前が空っぽ（何も入力されていない）なら
  if (name === "") {
    input.classList.add("error-shake"); // 震えるアニメーションを追加
    
    // 0.3秒後に震えクラスを消す（次また震えさせるため）
    setTimeout(() => input.classList.remove("error-shake"), 300);
    
    input.placeholder = "名前を入力してください！"; // ヒントを表示
    return; // ここで処理を中断して、診断を始めない
  }

  // 名前が入っていれば、ここから先が実行される
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQ();
}

function showQ(){
let q=questions[index];
document.getElementById("question").innerText=q.q;

let html="";
q.a.forEach(choice=>{
html+=`<button onclick="answer(${choice[1]})">${choice[0]}</button>`;
});
document.getElementById("choices").innerHTML=html;
}

function answer(score){
let axis=questions[index].axis;
if(axis==="A") A+=score;
if(axis==="C") C+=score;
if(axis==="R") R+=score;

index++;
index<questions.length?showQ():showResult();
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

function judge(x,pos,neg){
  return x >= 0 ? pos : neg;
}

let type =
judge(A,"A","P") +
judge(C,"C","I") +
judge(R,"R","L");

document.getElementById("resultTitle").innerText=name+"さんの結果は…";
document.getElementById("typeName").innerText=type;

// 画像
const images={
ACR:"https://via.placeholder.com/200?text=Lion",
ACL:"https://via.placeholder.com/200?text=Swan",
AIR:"https://via.placeholder.com/200?text=Hamster",
AIL:"https://via.placeholder.com/200?text=Panda",
PCR:"https://via.placeholder.com/200?text=Cat",
PCL:"https://via.placeholder.com/200?text=Deer",
PIR:"https://via.placeholder.com/200?text=Rabbit",
PIL:"https://via.placeholder.com/200?text=Turtle"
};

document.getElementById("resultImage").src=images[type];

const texts={
ACR:{
desc:"このタイプは、恋愛において必要とされる要素である「積極性」「自己肯定感」「環境」のすべてが高い水準でそろっている、いわばかなり有利な立場にいるタイプ。",
good:"まず積極性の面では、自分から人に話しかけたり距離を縮めたりすることに対して強い抵抗がなく、気になる相手がいれば自然な流れで関係を深めていくことができます。そのため、恋愛のスタートラインに立つこと自体が難しくなく、チャンスを自分で作り出せる力を持っています。さらに自己肯定感も高いため、「自分なんかが好かれるわけない」といったネガティブな思い込みに縛られにくく、相手と対等な関係を築こうとする姿勢を持っているのも特徴です。これによって、相手に対して過度に依存したり、自分を下げすぎたりすることが少なく、安定したコミュニケーションが取りやすい状態になっています。また環境面においても、人との関わりが多かったり、友人関係が広かったりと、出会いの機会に恵まれていることが多く、恋愛に発展する可能性のある接点が日常の中に存在しているケースが多いです。このように三つの要素がそろっているため、周囲からは「モテそう」「恋愛で困らなそう」と思われやすく、実際にあと一歩で関係が進展する場面も少なくありません。",
bad:"一方で、強みがそろっているがゆえに、自分のペースで関係を進めすぎてしまうという側面もあります。自分にとっては自然な距離の詰め方でも、相手にとっては早すぎたり、気持ちが追いつかなかったりすることで、無意識のうちに温度差が生まれてしまうことがあります。また、選択肢が比較的多い環境にいるため、一人の相手に集中しきれず、「もっと合う人がいるのではないか」と考えてしまうこともあり、関係が深まる前に止まってしまうケースもあります。つまりこのタイプは、能力が不足しているのではなく、むしろ条件が整いすぎていることによってバランスを崩しやすいタイプであり、ほんの少しの調整によって恋愛の成功率が大きく変わる可能性を持っています。強みを活かしながらも、相手のペースや感情に目を向けることができれば、非常に安定した関係を築くことができるタイプです。",
advice:"このタイプに必要なのは「頑張ること」じゃなくて、ちょっとだけコントロールすることです。まず意識してほしいのは、“自分のテンポ＝相手のテンポじゃない”ということ。自分が10で進めたいときでも、相手はまだ5くらいのこともあります。\n具体的には\n・好意は最初から全部出さずに、ちょっと抑える\n・相手の返信速度やテンションに合わせる\n・会話で「聞く側」に少し寄る。\nこれだけでかなり印象が変わります。もう一つ大事なのは、「選べる立場」だからこそ雑にしないことです。選択肢が多いと無意識に一人一人への向き合い方が浅くなりやすい。でも、ちゃんと一人に向き合えたときこのタイプは輝くことができます。つまり、あなたは「できることを減らす」ことが成長になるタイプです。ちょっと抑えるだけで一気に“安定してモテる側”に入ります。"
},
ACL:{
desc:"このタイプは、一言でいうと「ポテンシャルは高いのに、それを発揮する場が足りていない」かなりもったいない状態にいるタイプ",

function percentText(x){
  let left = Math.max(0,50-x);
  let right = Math.max(0,50+x);
  return `${left}% : ${right}%`;
}

function toPercent(score, max) {
  // スコアの範囲は -max から +max なので、全体幅は max * 2
  // (-max を 0にするために maxを足す)
  return ((score + max) / (max * 2)) * 100;
}

function createBar(labelL, labelR, value, colorL, colorR, pointColor) {

  return `
  <div class="barBox">
    <div class="barLabel">
      <span style="color:${colorL}">${labelL}</span>
      <span style="color:${colorR}">${labelR}</span>
    </div>
    <div class="bar2">
      <div class="colorFill left" style="background:${colorL}; width:50%"></div>
      <div class="colorFill right" style="background:${colorR}; width:50%"></div>
      <div class="indicator" style="border-color:${pointColor}; left:50%"></div>
      <div class="percentInBar">
        <span class="p-left">50%</span>
        <span class="p-right">50%</span>
      </div>
    </div>
  </div>
  `;
}

  createBar("ACTIVE", "PASSIVE", "#ff6b9a", "#6bbcff", "#ff6b9a") +
  createBar("CONFIDENCE", "INSECURE", "#ffb86b", "#9b6bff", "#9b6bff") +
  createBar("READY", "LIMITED", "#4cd97b", "#ff6b6b", "#4cd97b");

 // アニメーション実行
setTimeout(() => {
  const values = [A_per, C_per, R_per];
  const colors = [
    { L: "#ff6b9a", R: "#6bbcff" },
    { L: "#ffb86b", R: "#9b6bff" },
    { L: "#4cd97b", R: "#ff6b6b" }
  ];
  
  const boxes = document.querySelectorAll(".barBox");
  boxes.forEach((box, i) => {
    const val = values[i];
    const pair = colors[i];
    const activeColor = (val >= 50) ? pair.L : pair.R;

    const indicator = box.querySelector(".indicator");
    indicator.style.left = val + "%";
    indicator.style.borderColor = activeColor;
    
    box.querySelector(".colorFill.left").style.width = val + "%";
    box.querySelector(".colorFill.right").style.width = (100 - val) + "%";
    box.querySelector(".p-left").textContent = val + "%";
    box.querySelector(".p-right").textContent = (100 - val) + "%";
  });
}, 100);
}

function copyResult() {
  const text = `${name}さんの診断結果は【${type}】でした！\n#彼氏ができない原因診断`;
  navigator.clipboard.writeText(text);
  alert("結果をコピーしました！SNSに貼り付けてね！");
}

</script>
